                                            <label className="text-xs text-slate-600 font-medium block mb-1">Custom GitHub skill sources (one per line; owner/repo or URL)</label>
                                            <textarea className="w-full p-2 border rounded text-xs h-20 bg-slate-50" placeholder="alchaincyf/steve-jobs-skill&#10;https://github.com/user/your-skill-repo" value={customSkillSources} onChange={(e) => setCustomSkillSources(e.target.value)} />

                                            <input type="file" multiple accept=".json,.md,.markdown,.txt" onChange={handleLocalSkillUpload} className="text-xs w-full" />
                                        </div>
                                        {skillStatus && <div className="text-xs mt-2 text-indigo-600">{skillStatus}</div>}
                                        {remoteSkills.length > 0 && (
                                            <div className="mt-3 max-h-36 overflow-y-auto border rounded p-2 space-y-1 bg-slate-50">
                                                {remoteSkills.map(skill => (
                                                    <label key={skill.id} className={`flex items-center justify-between text-xs gap-2 ${skill.isDuplicate ? 'opacity-60' : ''}`}>
                                                        <span className="truncate">
                                                            {skill.name} <span className="text-slate-400">({skill.repo.split('/')[1] || skill.repo})</span>
                                                            {skill.isBuiltIn && <span className="ml-1 text-[10px] px-1 py-0.5 rounded bg-amber-100 text-amber-700">Built-in duplicate</span>}
                                                            {!skill.isBuiltIn && skill.isImported && <span className="ml-1 text-[10px] px-1 py-0.5 rounded bg-blue-100 text-blue-700">Imported</span>}
                                                        </span>
                                                        <input type="checkbox" disabled={skill.isDuplicate} checked={selectedImportSkillIds.includes(skill.id)} onChange={() => toggleImportSelection(skill.id)} />
                                                    </label>

                                            </div>
                                        )}
                                        <div className="flex justify-end mt-2">
                                            <button onClick={importSelectedSkills} disabled={!selectedImportSkillIds.length} className="text-xs px-2 py-1 rounded bg-indigo-600 text-white hover:bg-indigo-700 disabled:bg-slate-300">Import Selected Skills</button>
                                        </div>

                                    <div onClick={() => setConfig(prev => ({...prev, specifyAgents: !prev.specifyAgents}))} className={`p-3 border rounded cursor-pointer flex justify-between items-center ${config.specifyAgents ? 'bg-indigo-50 border-indigo-300' : 'bg-white'}`}><span><UserPlus className="w-4 h-4 inline mr-2 text-indigo-600"/> Specify Council Members (Optional)</span><div className={`w-8 h-4 rounded-full relative transition-colors ${config.specifyAgents ? 'bg-indigo-600' : 'bg-gray-300'}`}><div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${config.specifyAgents ? 'left-4.5' : 'left-0.5'}`} style={{left: config.specifyAgents ? '18px' : '2px'}}/></div></div>
                                    {config.specifyAgents && (
                                        <div className="mt-3 grid grid-cols-1 md:grid-cols-2 gap-2 animate-in fade-in">
                                            {Array(config.expandedCouncil ? 5 : 3).fill(0).map((_, i) => (
                                                <div key={i} className="grid grid-cols-2 gap-2">
                                                    <input type="text" placeholder={`Member ${i+1} name`} className="p-2 border rounded text-xs" value={customAgentNames[i] || ''} onChange={(e) => { const newNames = [...customAgentNames]; newNames[i] = e.target.value; setCustomAgentNames(newNames); }} />
                                                    <select className="p-2 border rounded text-xs bg-white" value={customAgentSkills[i] || ''} onChange={(e) => { const newSkills = [...customAgentSkills]; newSkills[i] = e.target.value; setCustomAgentSkills(newSkills); }}>
                                                        <option value="">No skill</option>
                                                        {effectiveSkills.map(skill => <option key={skill.id} value={skill.id}>{skill.name}</option>)}
                                                    </select>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                             </div>
                        </div>

                        <div className="flex justify-end pt-4">
                            <button onClick={() => setConfig({...config, isSeminarConfigOpen: false})} className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors font-medium">Save Settings</button>
                        </div>
                    </div>
                </Modal>

                <Modal isOpen={!!selectedMsg} onClose={() => setSelectedMsg(null)}>
                    {selectedMsg && (
                        <div className="space-y-6">
                            <div className="flex items-center gap-4 border-b border-gray-100 pb-4">
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl ${selectedMsg.role === 'moderator' ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-600'}`}>{selectedMsg.sender[0]}</div>
                                <div><h3 className="text-xl font-bold text-slate-900">{selectedMsg.sender}</h3><div className="text-sm text-gray-500 flex items-center gap-2">{new Date(selectedMsg.timestamp).toLocaleString()}{selectedMsg.role === 'agent' && <span className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-xs">Council Member</span>}</div></div>
                            </div>
                            {selectedMsg.reasoning && (<div className="bg-amber-50 border border-amber-100 rounded-xl p-4 text-sm text-slate-700"><div className="font-bold text-amber-700 mb-2 flex items-center gap-2"><Lightbulb className="w-4 h-4"/> Detailed Reasoning</div><div className="whitespace-pre-wrap leading-relaxed opacity-90">{selectedMsg.reasoning}</div></div>)}
                            <div className="prose prose-lg max-w-none text-slate-800 leading-loose" dangerouslySetInnerHTML={{ __html: renderMarkdown(selectedMsg.text || '') }} />
                        </div>
                    )}
                </Modal>
              </div>
            </div>
          );
        }

        const renderFallbackError = (message) => {
          const rootEl = document.getElementById('root');
          if (!rootEl) return;
          rootEl.innerHTML = `
            <div class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
              <div class="max-w-xl w-full bg-white border border-red-200 rounded-xl p-5 shadow-sm">
                <h2 class="text-lg font-bold text-red-600 mb-2">Page failed to load (V9.1)</h2>
                <p class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">${String(message || 'Unknown error')}</p>
                <p class="text-xs text-slate-500 mt-3">Try: 1) clear localStorage; 2) run python -m http.server and open the page from the local server.</p>
                <a class="mt-4 inline-flex rounded-lg bg-indigo-600 px-3 py-2 text-xs font-semibold text-white hover:bg-indigo-700" href="index-V9.1.html">打开中文版本</a>
              </div>
            </div>
          `;
        };

        window.addEventListener('error', (e) => {
          console.error('Global Error:', e.error || e.message);
          renderFallbackError(e.error?.message || e.message);
        });
        window.addEventListener('unhandledrejection', (e) => {
          console.error('Unhandled Rejection:', e.reason);
          renderFallbackError(e.reason?.message || e.reason);
        });

        try {
          const root = createRoot(document.getElementById('root'));
          root.render(<CouncilOfSages />);
        } catch (err) {
          console.error('Render Failed:', err);
          renderFallbackError(err?.message || err);
        }
    </script>
</body>
</html>
