<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Council of Sages</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .prose p { margin-bottom: 0.5em; }
        .prose ul { list-style-type: disc; padding-left: 1.2em; margin-bottom: 0.5em; }
        .prose ol { list-style-type: decimal; padding-left: 1.2em; margin-bottom: 0.5em; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .modal-overlay { animation: fadeIn 0.2s ease-out; }
        .modal-content { animation: scaleIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <div class="fixed top-4 right-4 z-50 flex items-center rounded-lg border border-slate-200 bg-white p-1 text-xs font-semibold shadow-sm" aria-label="Language switcher">
          <a href="index-V9.1.html" class="rounded-md px-3 py-1.5 text-slate-500 hover:bg-slate-100" >中文</a>
          <a href="index-V9.1-en.html" class="rounded-md px-3 py-1.5 bg-indigo-600 text-white" aria-current="page">EN</a>
        </div>
        <div class="min-h-screen flex items-center justify-center p-6">
          <div class="max-w-xl w-full bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
            <h2 class="text-lg font-bold text-slate-800 mb-2">Council of Sages V9.1 is loading...</h2>
            <p class="text-sm text-slate-600 leading-relaxed">If this screen remains for too long, press <strong>Ctrl/Cmd + Shift + R</strong> to force-refresh, or open the app through a local server to avoid file:// compatibility issues.</p>
          </div>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo, memo } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
          Settings, MessageSquare, Users, Play, RotateCcw, Save, Trash2, Search, Cpu,
          CheckCircle2, AlertCircle, History, BrainCircuit, Edit3, Send, User,
          Info, Plug, Zap, Expand, ChevronDown, ChevronRight, Lightbulb, Plus,
          Download, FileText, RefreshCw, LayoutGrid, List, X, Maximize2, Filter,
          ToggleLeft, ToggleRight, Mic2, Star, Feather, UserPlus, Cloud, UploadCloud, LogOut, Sliders, Wrench, Square, Database
        } from 'lucide-react';

        const DEFAULT_BASE_URL = "https://api.openai.com/v1";
        const FALLBACK_AGENTS_POOL = [
          { name: "Charlie Munger", description: "Inversion, rigorous rationality, risk avoidance, and worldly wisdom.", color: "bg-blue-100 border-blue-300 text-blue-900" },
          { name: "Elon Musk", description: "First-principles thinking, radical innovation, and a multiplanetary future.", color: "bg-purple-100 border-purple-300 text-purple-900" },
          { name: "Socrates", description: "Socratic questioning, intellectual humility, and a search for first principles.", color: "bg-amber-100 border-amber-300 text-amber-900" },
          { name: "Kevin Kelly", description: "Technological optimism, technological evolution, and emergent systems.", color: "bg-rose-100 border-rose-300 text-rose-900" },
          { name: "Naval Ravikant", description: "Modern Stoicism, leveraged wealth creation, and minimalist rationality.", color: "bg-emerald-100 border-emerald-300 text-emerald-900" }
        ];
        const BUILTIN_SKILLS = [
          { id: "charlie-munger", name: "Charlie Munger", description: "A latticework of mental models, inversion, risk-first thinking, and long-termism.", repo: "alchaincyf/munger-skill", version: "builtin-1.0", profile: { mentalModels: ["Inversion", "Opportunity cost", "Circle of competence"], heuristics: ["Eliminate obvious mistakes before optimizing", "Avoid irreversible losses"], antiPatterns: ["Short-term speculation", "Emotion-driven decisions"], promptBlocks: { systemCore: "Analyze problems through multiple mental models; identify risks and biases before proposing actionable decisions.", debateStyle: "Be measured, logically rigorous, and oriented toward the long term.", boundary: "Avoid deterministic predictions; emphasize probabilities and a margin of safety."} } },
          { id: "elon-musk", name: "Elon Musk", description: "First principles, engineering decomposition, and radical innovation.", repo: "alchaincyf/elon-musk-skill", version: "builtin-1.0", profile: { mentalModels: ["First principles", "Hard constraints", "System redesign"], heuristics: ["Start with physical limits, then determine the engineering path", "Remove unnecessary steps"], antiPatterns: ["Process worship", "Path dependence"], promptBlocks: { systemCore: "Reframe the problem from first principles and produce a testable engineering plan.", debateStyle: "Be direct, structured, and execution-focused.", boundary: "Do not stop at vision; ground every proposal in constraints and an implementation path."} } },
          { id: "naval-ravikant", name: "Naval Ravikant", description: "Leverage, long-term compounding, happiness, and freedom.", repo: "alchaincyf/naval-skill", version: "builtin-1.0", profile: { mentalModels: ["Leverage", "Compounding", "Specific knowledge"], heuristics: ["Seek choices that remain reusable over the long term", "Reduce internal friction and focus on what matters"], antiPatterns: ["Taking on too many parallel pursuits", "Short-term comparison"], promptBlocks: { systemCore: "Evaluate choices through leverage and compounding while balancing wealth and happiness.", debateStyle: "Be concise, insightful, and incisive.", boundary: "Do not create anxiety or encourage reckless action."} } },
          { id: "richard-feynman", name: "Richard Feynman", description: "First-principles understanding, explainability, and experimental thinking.", repo: "alchaincyf/feynman-skill", version: "builtin-1.0", profile: { mentalModels: ["Explainability", "Experimental validation", "Simplified abstraction"], heuristics: ["If you cannot explain it clearly, you do not understand it", "Begin with a falsifiable hypothesis"], antiPatterns: ["Jargon stacking", "Reliance on authority"], promptBlocks: { systemCore: "Explain complex problems clearly and design a verifiable testing path.", debateStyle: "Use plain language, clarity, and evidence.", boundary: "State uncertainty explicitly when evidence is insufficient."} } },
          { id: "nassim-taleb", name: "Nassim Taleb", description: "Antifragility, tail risk, and the barbell strategy.", repo: "alchaincyf/taleb-skill", version: "builtin-1.0", profile: { mentalModels: ["Antifragility", "Black swans", "Convex payoffs"], heuristics: ["Manage tail risks first", "Keep upside open while limiting downside"], antiPatterns: ["Fragile high leverage", "The illusion of averages"], promptBlocks: { systemCore: "Identify systemic fragility and tail risks first, then design an antifragile approach.", debateStyle: "Be vigilant, critical, and risk-control oriented.", boundary: "Avoid false precision and reject fragile narratives of certainty."} } },
          { id: "kevin-kelly", name: "Kevin Kelly", description: "Long-term technology trends, system evolution, and optimism.", repo: "alchaincyf/kevin-kelly-skill", version: "builtin-1.0", profile: { mentalModels: ["Long technology cycles", "Network effects", "Emergence"], heuristics: ["Focus on ten-year trends rather than ten-day fluctuations", "Prefer sustainable evolutionary paths"], antiPatterns: ["Short-sighted linear extrapolation", "Ignoring ecosystem synergies"], promptBlocks: { systemCore: "Evaluate strategic direction through the lens of long-term technological evolution.", debateStyle: "Be forward-looking, systematic, and optimistic without being naive.", boundary: "Do not ignore real-world resource and organizational constraints."} } },
          { id: "socrates", name: "Socrates", description: "Socratic questioning, conceptual clarity, and examination of values.", repo: "alchaincyf/socrates-skill", version: "builtin-1.0", profile: { mentalModels: ["Socratic questioning", "Define terms first", "Value consistency"], heuristics: ["Clarify concepts before debating conclusions", "Advance reasoning through questions"], antiPatterns: ["Equivocation", "Untested assumptions"], promptBlocks: { systemCore: "Use questions to clarify definitions, assumptions, and value conflicts.", debateStyle: "Probe through progressively structured logic and focus on essentials.", boundary: "Do not over-argue wording; focus on the core proposition."} } },
          { id: "paul-graham", name: "Paul Graham", description: "The fundamentals of startups, user value, and iterative growth.", repo: "alchaincyf/paul-graham-skill", version: "builtin-1.0", profile: { mentalModels: ["Make something people want", "Iterate quickly in small steps", "Founder-led execution"], heuristics: ["Validate genuine demand first", "Test assumptions through growth and retention"], antiPatterns: ["False demand", "Premature scaling"], promptBlocks: { systemCore: "Evaluate feasibility through startup execution and product validation.", debateStyle: "Be pragmatic, product-oriented, and experimental.", boundary: "Do not discuss strategy without grounding it in user evidence."} } }
        ];
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        const safeParseJSON = (value, fallback) => {
          if (!value) return fallback;
          try { return JSON.parse(value); } catch (e) { console.warn('JSON parse failed:', e); return fallback; }
        };
        const escapeHtml = (unsafe = '') => unsafe
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
        const renderMarkdown = (text = '') => {
          if (!text) return '';
          if (window.marked) {
            return window.marked.parse(text, { breaks: true, gfm: true });
          }
          return `<p>${escapeHtml(text).replaceAll('\n', '<br/>')}</p>`;
        };

        // --- UI Components ---
        const AutoResizeTextarea = ({ value, onChange, onEnter, placeholder, className, disabled }) => {
            const textareaRef = useRef(null);
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = `${textareaRef.current.scrollHeight}px`;
                }
            }, [value]);
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (onEnter) onEnter();
                }
            };
            return (
                <textarea ref={textareaRef} value={value} onChange={onChange} onKeyDown={handleKeyDown} placeholder={placeholder} className={className} disabled={disabled} rows={1} style={{ resize: 'none', overflow: 'hidden', minHeight: '44px' }} />
            );
        };

        const Modal = ({ isOpen, onClose, children, maxWidth = "max-w-4xl" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay bg-black/50 backdrop-blur-sm" onClick={onClose}>
                    <div className={`bg-white rounded-2xl shadow-2xl w-full ${maxWidth} max-h-[90vh] overflow-hidden flex flex-col modal-content`} onClick={e => e.stopPropagation()}>
                        <div className="flex justify-end p-2 border-b border-gray-100 sticky top-0 bg-white z-10">
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><X className="w-5 h-5 text-gray-500" /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 md:p-8">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Message Card Component ---
        const MessageCard = memo(({ msg, onSelect }) => {
             const isAgent = msg.role === 'agent';
             const isMod = msg.role === 'moderator';
             const isSummary = isMod && (msg.text.length > 50 || msg.text.includes('\n'));
             let borderColor = "border-gray-200", bgColor = "bg-white", iconColor = "bg-gray-100 text-gray-600";
             if (isMod) {
                 if (isSummary) { borderColor = "border-amber-200 ring-2 ring-amber-100"; bgColor = "bg-amber-50/50"; iconColor = "bg-amber-500 text-white"; }
                 else { borderColor = "border-indigo-200 ring-2 ring-indigo-50"; bgColor = "bg-indigo-50/50"; iconColor = "bg-indigo-600 text-white"; }
             } else if(msg.style && msg.style.includes("border-")) { const match = msg.style.match(/border-(\w+-\d+)/); if(match) borderColor = `border-${match[1]}`; }

             return (
                <div className={`${bgColor} p-3 rounded-xl border ${borderColor} shadow-sm hover:shadow-md transition-all flex flex-col h-full group relative`}>
                    <div className="flex-1 cursor-pointer" onClick={() => onSelect(msg)}>
                        <div className="flex items-center gap-2 mb-2">
                            <div className={`w-6 h-6 rounded-full flex items-center justify-center font-bold text-[10px] ${iconColor}`}>{msg.role === 'user' ? <User className="w-3 h-3"/> : (isMod ? (isSummary ? <Star className="w-3 h-3"/> : <Mic2 className="w-3 h-3"/>) : msg.sender[0])}</div>
                            <span className={`font-bold text-xs truncate ${isMod ? 'text-indigo-900' : 'text-slate-700'}`}>{msg.sender}</span>
                            {msg.reasoning && <Lightbulb className="w-3 h-3 text-amber-400 ml-auto" />}
                        </div>
                        <div className={`text-xs line-clamp-6 leading-relaxed ${isMod ? 'text-slate-800 font-medium' : 'text-gray-600'}`}>{msg.text || <span className="animate-pulse">Thinking...</span>}</div>
                    </div>
                    <div className="mt-2 pt-2 border-t border-gray-100 flex justify-between items-center text-[10px] text-gray-400">
                        <span>{new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        <button onClick={(e) => { e.stopPropagation(); onSelect(msg); }} className="flex items-center gap-1 text-indigo-500 hover:text-indigo-700 font-medium px-2 py-1 rounded hover:bg-indigo-50 transition-colors">Read more <Maximize2 className="w-3 h-3" /></button>
                    </div>
                </div>
             );
        }, (prev, next) => prev.msg.text === next.msg.text && prev.msg.reasoning === next.msg.reasoning);

        const MessageBubble = ({ msg }) => {
            const [expandReasoning, setExpandReasoning] = useState(false);
            if (msg.role === 'system') return <div className="flex items-center gap-4 opacity-50 my-2"><div className="h-px bg-gray-300 flex-1"></div><span className="text-xs text-gray-500">{msg.text}</span><div className="h-px bg-gray-300 flex-1"></div></div>;
            const isMod = msg.role === 'moderator';
            const isUser = msg.role === 'user';
            return (
              <div className={`max-w-[90%] w-full rounded-2xl p-5 relative ${isMod ? 'bg-slate-800 text-white shadow-xl' : isUser ? 'bg-indigo-600 text-white shadow-md' : 'bg-white border border-gray-200 shadow-sm'}`}>
                <div className="flex items-center gap-2 mb-3 pb-2 border-b border-white/10 border-gray-100"><span className="font-bold text-sm">{msg.sender}</span></div>
                {msg.reasoning && (<div className="mb-3"><button onClick={() => setExpandReasoning(!expandReasoning)} className={`flex items-center gap-1 text-xs font-bold uppercase tracking-wider mb-1 hover:opacity-80 transition-opacity ${isMod || isUser ? 'text-indigo-300' : 'text-slate-400'}`}><Lightbulb className="w-3 h-3" /> Reasoning {expandReasoning ? <ChevronDown className="w-3 h-3"/> : <ChevronRight className="w-3 h-3"/>}</button>{expandReasoning && (<div className={`text-xs p-3 rounded leading-relaxed whitespace-pre-wrap ${isMod || isUser ? 'bg-white/10' : 'bg-slate-50 text-slate-500 border-l-2 border-slate-200'}`}>{msg.reasoning}</div>)}</div>)}
                <div className={`prose prose-sm max-w-none ${isMod || isUser ? 'prose-invert' : ''}`}>
                  {msg.text
                    ? <div className="leading-relaxed" dangerouslySetInnerHTML={{ __html: renderMarkdown(msg.text) }} />
                    : <span className="animate-pulse">...</span>}
                </div>
              </div>
            );
        };

        // --- Main App ---
        function CouncilOfSages() {
          const [config, setConfig] = useState({
            baseUrl: '', apiKey: '', model: 'gpt-3.5-turbo', moderatorModel: 'gpt-3.5-turbo',
            deepDebate: false, expandedCouncil: false, debateRounds: 2,
            agentStylePrompt: "", specifyAgents: false, googleClientId: ''
          });
          const [customAgentNames, setCustomAgentNames] = useState(Array(5).fill(''));
          const [customAgentSkills, setCustomAgentSkills] = useState(Array(5).fill(''));
          const [availableModels, setAvailableModels] = useState([]);
          const [isSettingsOpen, setIsSettingsOpen] = useState(true);
          const [connectionStatus, setConnectionStatus] = useState('idle');
          const [errorMessage, setErrorMessage] = useState('');
          const [manualModelInput, setManualModelInput] = useState(true);
          const [modelFilter, setModelFilter] = useState('');
          const [modFilter, setModFilter] = useState('');
          const [viewMode, setViewMode] = useState('board');

          // Google Drive State
          const [isGoogleSignedIn, setIsGoogleSignedIn] = useState(false);
          const [googleToken, setGoogleToken] = useState(null);
          const [driveStatus, setDriveStatus] = useState('idle');

          const [topic, setTopic] = useState(() => sessionStorage.getItem('council_topic_draft') || '');
          const [sessions, setSessions] = useState([]);
          const [currentSessionId, setCurrentSessionId] = useState(null);
          const [agents, setAgents] = useState([]);
          const [transcript, setTranscript] = useState([]);
          const [isProcessing, setIsProcessing] = useState(false);
          const [stage, setStage] = useState('idle');
          const [userInput, setUserInput] = useState(() => sessionStorage.getItem('council_user_draft') || '');
          const [selectedMsg, setSelectedMsg] = useState(null);
          const [importedSkills, setImportedSkills] = useState([]);
          const [remoteSkills, setRemoteSkills] = useState([]);
          const [selectedImportSkillIds, setSelectedImportSkillIds] = useState([]);
          const [isRefreshingSkills, setIsRefreshingSkills] = useState(false);
          const [skillStatus, setSkillStatus] = useState('');
          const [customSkillSources, setCustomSkillSources] = useState('');

          const scrollRef = useRef(null);
          const contextRef = useRef([]);
          const activeSessionIdRef = useRef(null);
          const abortControllerRef = useRef(null); // Ref for abort controller

          useEffect(() => {
            const savedConfig = localStorage.getItem('council_config') || localStorage.getItem('council_en_config');
            if (savedConfig) setConfig(safeParseJSON(savedConfig, config));
            const savedSessions = localStorage.getItem('council_sessions') || localStorage.getItem('council_en_sessions');
            const parsedSessions = savedSessions ? safeParseJSON(savedSessions, []) : [];
            setSessions(parsedSessions);

            const activeSessionId = sessionStorage.getItem('council_active_session_id');
            const activeSession = parsedSessions.find(session => session.id === activeSessionId);
            if (activeSession) {
                setCurrentSessionId(activeSession.id);
                activeSessionIdRef.current = activeSession.id;
                setTopic(activeSession.topic);
                setAgents(activeSession.agents || []);
                setTranscript(activeSession.transcript || []);
                const rebuiltContext = [`Current topic: ${activeSession.topic}`];
                (activeSession.transcript || []).forEach(message => {
                    const prefix = message.role === 'user' ? '[User intervention]: ' : `${message.sender}: `;
                    rebuiltContext.push(`${prefix}${message.text}`);
                });
                contextRef.current = rebuiltContext;
                setStage((activeSession.transcript || []).length > 0 ? 'finished' : 'idle');
                setIsSettingsOpen(false);
            }
            sessionStorage.removeItem('council_active_session_id');
            sessionStorage.removeItem('council_topic_draft');
            sessionStorage.removeItem('council_user_draft');
            const savedImportedSkills = localStorage.getItem('council_imported_skills') || localStorage.getItem('council_en_imported_skills');
            if (savedImportedSkills) setImportedSkills(safeParseJSON(savedImportedSkills, []));

            const script = document.createElement('script');
            script.src = "https://accounts.google.com/gsi/client";
            script.async = true;
            script.defer = true;
            document.body.appendChild(script);
            return () => { if (document.body.contains(script)) document.body.removeChild(script); }
          }, []);

          useEffect(() => { localStorage.setItem('council_config', JSON.stringify(config)); }, [config]);
          useEffect(() => { localStorage.setItem('council_sessions', JSON.stringify(sessions)); }, [sessions]);
          useEffect(() => { localStorage.setItem('council_imported_skills', JSON.stringify(importedSkills)); }, [importedSkills]);

          useEffect(() => {
            if (scrollRef.current && viewMode === 'list') {
                scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }
          }, [transcript, stage, isProcessing, viewMode]);

          // --- Google Drive Logic ---
          const handleGoogleLogin = () => {
              if (!config.googleClientId) { alert("Please configure a Google Client ID at the bottom of Settings first."); setIsSettingsOpen(true); return; }
              if (!window.google) { alert("The Google sign-in script is loading. Please try again shortly."); return; }
              const client = window.google.accounts.oauth2.initTokenClient({
                  client_id: config.googleClientId,
                  scope: 'https://www.googleapis.com/auth/drive.file',
                  callback: (tokenResponse) => {
                      if (tokenResponse && tokenResponse.access_token) {
                          setGoogleToken(tokenResponse.access_token);
                          setIsGoogleSignedIn(true);
                      }
                  },
              });
              client.requestAccessToken();
          };

          const uploadToDrive = async () => {
              if (!googleToken) { handleGoogleLogin(); return; }
              setDriveStatus('uploading');
              try {
                  const fileContent = JSON.stringify(sessions, null, 2);
                  const fileData = new Blob([fileContent], { type: 'application/json' });
                  const metadata = { name: `council_backup_${new Date().toISOString().slice(0,10)}.json`, mimeType: 'application/json' };
                  const form = new FormData();
                  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                  form.append('file', fileData);

                  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                      method: 'POST', headers: { 'Authorization': `Bearer ${googleToken}` }, body: form
                  });
                  if (!res.ok) throw new Error(await res.text());
                  setDriveStatus('success'); setTimeout(() => setDriveStatus('idle'), 3000);
              } catch (error) {
                  console.error("Drive Upload Error:", error); setDriveStatus('error');
                  alert(`Upload failed: ${error.message}\nPlease check your Authorized JavaScript origins configuration.`);
              }
          };

          const handleGoogleLogout = () => {
              if (googleToken && window.google) {
                  window.google.accounts.oauth2.revoke(googleToken, () => { setGoogleToken(null); setIsGoogleSignedIn(false); });
              } else { setGoogleToken(null); setIsGoogleSignedIn(false); }
          };

          // --- Logic Helpers ---
          const updateSessionInHistory = (sessionId, dataToUpdate) => {
              if (!sessionId) return;
              setSessions(prev => prev.map(s => s.id === sessionId ? { ...s, ...dataToUpdate } : s));
          };

          const updateMessage = (msgId, newText, newReasoning) => {
            setTranscript(prev => prev.map(msg => msg.id === msgId ? { ...msg, text: newText, reasoning: newReasoning } : msg));
          };

          const finalizeMessage = (msgId, finalText, finalReasoning) => {
             setTranscript(prev => prev.map(msg => msg.id === msgId ? { ...msg, text: finalText, reasoning: finalReasoning } : msg));
             const activeId = activeSessionIdRef.current;
             if (activeId) {
                 setSessions(prevSessions => {
                     return prevSessions.map(session => {
                         if (session.id === activeId) {
                             const existingTranscript = session.transcript ? [...session.transcript] : [];
                             const msgIndex = existingTranscript.findIndex(m => m.id === msgId);
                             const updatedMsg = {
                                 id: msgId, text: finalText, reasoning: finalReasoning, timestamp: Date.now(),
                                 role: existingTranscript[msgIndex]?.role || 'unknown',
                                 sender: existingTranscript[msgIndex]?.sender || 'Unknown',
                                 style: existingTranscript[msgIndex]?.style
                             };
                             if (msgIndex !== -1) existingTranscript[msgIndex] = { ...existingTranscript[msgIndex], text: finalText, reasoning: finalReasoning };
                             else existingTranscript.push(updatedMsg);
                             return { ...session, transcript: existingTranscript };
                         }
                         return session;
                     });
                 });
             }
          };

          const addToTranscript = (sender, role, text, style = '', reasoning = '') => {
            const id = generateId();
            const msg = { id, sender, role, text, reasoning, style, timestamp: Date.now() };
            setTranscript(prev => [...prev, msg]);
            const prefix = role === 'user' ? `[User intervention]: ` : `${sender}: `;
            contextRef.current.push(`${prefix}${text}`);
            const activeId = activeSessionIdRef.current;
            if (activeId) {
                setSessions(prev => prev.map(s => {
                    if (s.id === activeId) return { ...s, transcript: [...(s.transcript || []), msg] };
                    return s;
                }));
            }
            return id;
          };

          // --- API ---
          const getCleanUrl = () => config.baseUrl.trim().replace(/\/$/, "") || DEFAULT_BASE_URL;

          const streamLLM = async (messages, specificModel, onToken, onReasoningToken) => {
            const url = getCleanUrl() + "/chat/completions";
            const modelToUse = specificModel || config.model;

            // Use the abort signal from the ref if available
            const signal = abortControllerRef.current ? abortControllerRef.current.signal : null;

            try {
              const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.apiKey.trim()}` },
                body: JSON.stringify({ model: modelToUse, messages, temperature: 0.7, stream: true }),
                signal // Pass the abort signal
              });
              if (!res.ok) { const err = await res.text(); throw new Error(`API Error ${res.status}: ${err}`); }
              const reader = res.body.getReader();
              const decoder = new TextDecoder("utf-8");
              let buffer = '';
              while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                  const t = line.trim();
                  if (!t || t === 'data: [DONE]') continue;
                  if (t.startsWith('data: ')) {
                    try {
                      const json = JSON.parse(t.slice(6));
                      const delta = json.choices[0]?.delta;
                      if (delta) {
                        if (delta.reasoning_content && onReasoningToken) onReasoningToken(delta.reasoning_content);
                        if (delta.content && onToken) onToken(delta.content);
                      }
                    } catch (e) {}
                  }
                }
              }
            } catch (error) {
              // Ignore abort errors
              if (error.name === 'AbortError') {
                 console.log('Stream aborted');
                 return;
              }
              console.error("Stream Failed:", error);
              if (error.name === 'TypeError' && error.message.includes('fetch')) throw new Error(`The network request failed (possibly due to CORS or a timeout). Check your connection or use a compatible browser extension.`);
              throw error;
            }
          };

          const callLLM = async (messages, specificModel = null) => {
            let fullText = "";
            await streamLLM(messages, specificModel, (chunk) => fullText += chunk);
            return fullText;
          };

          const fetchModels = async () => {
             if (!config.apiKey) { setErrorMessage("Please enter an API key first."); setConnectionStatus('error'); return; }
             setConnectionStatus('testing'); setErrorMessage('');
             try {
               const res = await fetch(`${getCleanUrl()}/models`, { headers: { 'Authorization': `Bearer ${config.apiKey.trim()}` } });
               if (!res.ok) throw new Error("API Error");
               const data = await res.json();
               const ids = (data.data || []).map(m => m.id).sort();
               if(ids.length === 0) throw new Error("No models");
               setAvailableModels(ids); setConnectionStatus('success'); setManualModelInput(false);
             } catch(e) {
               console.warn(e);
               if (!manualModelInput) setManualModelInput(true);
               setConnectionStatus('warning');
               setErrorMessage(`Connection test failed: ${e.message}. Check the URL, API key, and CORS settings.`);
             }
          };

          const testConnection = () => { fetchModels(); };

          const filteredModels = useMemo(() => {
              if (!modelFilter.trim()) return availableModels;
              return availableModels.filter(m => m.toLowerCase().includes(modelFilter.toLowerCase()));
          }, [availableModels, modelFilter]);

          const filteredModModels = useMemo(() => {
              if (!modFilter.trim()) return availableModels;
              return availableModels.filter(m => m.toLowerCase().includes(modFilter.toLowerCase()));
          }, [availableModels, modFilter]);

          const effectiveSkills = useMemo(() => {
              const byId = new Map(BUILTIN_SKILLS.map(s => [s.id, { ...s, source: 'builtin' }]));
              importedSkills.forEach(s => byId.set(s.id, { ...s, source: 'imported' }));
              return Array.from(byId.values()).sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
          }, [importedSkills]);

          const skillMap = useMemo(() => new Map(effectiveSkills.map(s => [s.id, s])), [effectiveSkills]);

          const normalizeSkillId = (text) => (text || '').toLowerCase().replace(/-skill$/,'').replace(/-perspective$/,'').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
          const prettySkillName = (base) => base.split('-').map(w => w[0] ? w[0].toUpperCase() + w.slice(1) : '').join(' ');
          const parseGitHubSource = (input) => {
              const text = (input || '').trim();
              if (!text) return null;
              if (/^[\w.-]+\/[\w.-]+$/.test(text)) {
                  const [owner, repo] = text.split('/');
                  return { ownerRepo: `${owner}/${repo}`, id: normalizeSkillId(repo), name: prettySkillName(repo.replace(/-skill$/,'')) };
              }
              const match = text.match(/github\.com\/([^\/]+)\/([^\/#?]+)/i);
              if (match) {
                  const owner = match[1], repo = match[2].replace(/\.git$/, '');
                  return { ownerRepo: `${owner}/${repo}`, id: normalizeSkillId(repo), name: prettySkillName(repo.replace(/-skill$/,'')) };
              }
              return null;
          };

          const parseSkillMarkdown = (raw, fallbackName) => {
              const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
              const pick = (keyword) => lines.filter(l => l.includes(keyword)).slice(0, 5).map(l => l.replace(/^[-*]\s*/, ''));
              const short = lines.filter(l => !l.startsWith('#') && l.length > 15).slice(0, 4).join(' ');
              return {
                  mentalModels: pick('model').concat(pick('\u6a21\u578b')).slice(0, 6),
                  heuristics: pick('heuristic').concat(pick('\u542f\u53d1')).slice(0, 8),
                  antiPatterns: pick('anti').concat(pick('\u7981\u5fcc')).slice(0, 6),
                  promptBlocks: {
                      systemCore: `You are a distilled reasoning profile of ${fallbackName}. Follow this person's cognitive framework rather than merely imitating their tone.`,
                      debateStyle: `Keep the methodology consistent throughout the debate and provide structured claims with supporting reasons.`,
                      boundary: `When evidence is insufficient, state the uncertainty and assumptions explicitly.`
                  },
                  rawExcerpt: short
              };
          };

          const refreshRemoteSkills = async () => {
              setIsRefreshingSkills(true);
              setSkillStatus('');
              try {
                  const res = await fetch('https://api.github.com/users/alchaincyf/repos?per_page=100');
                  if (!res.ok) throw new Error(`HTTP ${res.status}`);
                  const repos = await res.json();
                  const skills = repos
                    .filter(r => r.name.endsWith('-skill') && r.name !== 'nuwa-skill' && !r.name.toLowerCase().includes('zhangxuefeng'))
                    .map(r => {
                        const base = r.name.replace(/-skill$/, '');
                        const pretty = prettySkillName(base);
                        return { id: normalizeSkillId(base), name: pretty, repo: `alchaincyf/${r.name}`, version: r.updated_at || 'unknown', updatedAt: r.updated_at || null };
                    })
                    .sort((a, b) => a.name.localeCompare(b.name));

                  const customSources = customSkillSources.split('\n').map(s => s.trim()).filter(Boolean);
                  customSources.forEach((source) => {
                      const parsed = parseGitHubSource(source);
                      if (!parsed || parsed.ownerRepo.toLowerCase().includes('zhangxuefeng')) return;
                      skills.push({
                          id: parsed.id,
                          name: parsed.name,
                          repo: parsed.ownerRepo,
                          version: 'custom-source',
                          updatedAt: null
                      });
                  });

                  const existingIds = new Set(effectiveSkills.map(s => s.id));
                  const unique = [];
                  const seen = new Set();
                  skills.forEach((skill) => {
                      if (seen.has(skill.id)) return;
                      seen.add(skill.id);
                      unique.push({
                          ...skill,
                          isDuplicate: existingIds.has(skill.id),
                          isBuiltIn: BUILTIN_SKILLS.some(b => b.id === skill.id),
                          isImported: importedSkills.some(i => i.id === skill.id)
                      });
                  });
                  setRemoteSkills(unique);
                  setSkillStatus(`Found ${unique.length} available skills; duplicates have been marked automatically.`);
              } catch (e) {
                  setSkillStatus(`Refresh failed: ${e.message}`);
              } finally {
                  setIsRefreshingSkills(false);
              }
          };

          const handleLocalSkillUpload = async (event) => {
              const files = Array.from(event.target.files || []);
              if (!files.length) return;
              const uploaded = [];
              for (const file of files) {
                  try {
                      const raw = await file.text();
                      if (file.name.toLowerCase().endsWith('.json')) {
                          const parsed = safeParseJSON(raw, null);
                          if (!parsed) continue;
                          const list = Array.isArray(parsed) ? parsed : [parsed];
                          list.forEach((item, idx) => {
                              const id = normalizeSkillId(item.id || item.name || `${file.name}-${idx}`);
                              uploaded.push({
                                  id,
                                  name: item.name || prettySkillName(id),
                                  description: item.description || 'Local uploaded skill',
                                  repo: 'local-upload',
                                  version: 'local',
                                  updatedAt: new Date().toISOString(),
                                  profile: item.profile || parseSkillMarkdown(raw, item.name || prettySkillName(id))
                              });
                          });
                      } else {
                          const id = normalizeSkillId(file.name.replace(/\.(md|markdown|txt)$/i, ''));
                          uploaded.push({
                              id,
                              name: prettySkillName(id),
                              description: `${prettySkillName(id)} (local markdown skill)`,
                              repo: 'local-upload',
                              version: 'local',
                              updatedAt: new Date().toISOString(),
                              profile: parseSkillMarkdown(raw, prettySkillName(id))
                          });
                      }
                  } catch (e) {
                      console.warn('Local skill upload failed:', file.name, e);
                  }
              }
              if (uploaded.length) {
                  setImportedSkills(prev => {
                      const byId = new Map(prev.map(s => [s.id, s]));
                      uploaded.forEach(s => byId.set(s.id, s));
                      return Array.from(byId.values());
                  });
                  setSkillStatus(`Local import complete: ${uploaded.length} skill(s).`);
              } else {
                  setSkillStatus('Local import failed: no valid skill files were recognized.');
              }
              event.target.value = '';
          };

          const toggleImportSelection = (id) => {
              setSelectedImportSkillIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
          };

          const importSelectedSkills = async () => {
              if (selectedImportSkillIds.length === 0) return;
              setSkillStatus('Importing...');
              const targets = remoteSkills.filter(s => selectedImportSkillIds.includes(s.id) && !s.isDuplicate);
              const importedBatch = [];
              for (const item of targets) {
                  try {
                      const ownerRepo = item.repo.includes('/') ? item.repo : `alchaincyf/${item.repo}`;
                      const candidateRefs = ['main', 'master'];
                      let raw = '';
                      let lastError = null;
                      for (const ref of candidateRefs) {
                          const rawUrl = `https://raw.githubusercontent.com/${ownerRepo}/${ref}/SKILL.md`;
                          const res = await fetch(rawUrl);
                          if (res.ok) {
                              raw = await res.text();
                              break;
                          }
                          lastError = new Error(`${ref}: ${res.status}`);
                      }
                      if (!raw) throw new Error(`Failed to fetch SKILL.md (${ownerRepo}) ${lastError ? lastError.message : ''}`);
                      importedBatch.push({
                          id: item.id,
                          name: item.name,
                          description: `${item.name} distilled reasoning skill (manual import)`,
                          repo: item.repo,
                          version: item.version,
                          updatedAt: item.updatedAt,
                          profile: parseSkillMarkdown(raw, item.name)
                      });
                  } catch (e) {
                      console.warn('Import skill failed', item.id, e);
                  }
              }
              if (importedBatch.length > 0) {
                  setImportedSkills(prev => {
                      const byId = new Map(prev.map(s => [s.id, s]));
                      importedBatch.forEach(s => byId.set(s.id, s));
                      return Array.from(byId.values());
                  });
                  setSkillStatus(`Import complete: ${importedBatch.length} skill(s).`);
              } else {
                  setSkillStatus('Import failed: no skills were imported.');
              }
              setSelectedImportSkillIds([]);
          };

          // --- Stop Logic ---
          const handleStop = () => {
            if (abortControllerRef.current) {
                abortControllerRef.current.abort();
            }
            setIsProcessing(false);
            setStage('idle');
            // Reset to show input, but keep topic
            setTranscript([]);
            setAgents([]);
            // Also reset session details to ensure we start fresh if they click start again
            setCurrentSessionId(null);
            activeSessionIdRef.current = null;
            contextRef.current = [];
          };

          // --- Business Logic ---
          const runDebateRound = async (currentAgents, roundType = 'initial') => {
            setIsProcessing(true);
            for (const agent of currentAgents) {
              // Check abort before each agent starts
              if (abortControllerRef.current?.signal.aborted) return;

              const msgId = addToTranscript(agent.name, 'agent', '', agent.style, '');
              let attempts = 0; const maxAttempts = 3; let success = false;
              while(attempts < maxAttempts && !success) {
                if (abortControllerRef.current?.signal.aborted) return;
                try {
                  const fullHistory = contextRef.current;
                  let contextStr = "";
                  if (fullHistory.length > 25) {
                      const topicMsg = fullHistory[0];
                      const recentMsgs = fullHistory.slice(-20);
                      contextStr = [topicMsg, "...(earlier history omitted)...", ...recentMsgs].join("\n\n");
                  } else { contextStr = fullHistory.join("\n\n"); }

                  let instruction = roundType === 'initial' ? "Present a clear, incisive opening position." : (config.deepDebate ? "Deep debate: quote or explicitly reference another participant, then critique or reconsider their position." : "Cross-examination: respond directly to another participant's argument.");
                  const styleConstraint = config.agentStylePrompt ? `\n[Global style constraint]：${config.agentStylePrompt}\nFollow the style constraint above strictly.` : "";
                  const skillConstraint = agent.skillProfile ? `\n[Skill constraints]\nCore framework: ${agent.skillProfile.promptBlocks?.systemCore || ''}\nDebate style: ${agent.skillProfile.promptBlocks?.debateStyle || ''}\nBoundaries: ${agent.skillProfile.promptBlocks?.boundary || ''}\nHeuristics: ${(agent.skillProfile.heuristics || []).slice(0, 4).join('；')}` : "";
                  const prompt = `You are ${agent.name}. Persona: ${agent.description}.\nTopic: "${topic}".\nDebate history: """${contextStr}"""\n${instruction}\n${skillConstraint}\n${styleConstraint}\nRequirement: Respond entirely in English.`;

                  let currentText = ""; let currentReasoning = "";
                  await streamLLM([{ role: "user", content: prompt }], config.model,
                    (t) => { currentText += t; updateMessage(msgId, currentText, currentReasoning); },
                    (r) => { currentReasoning += r; updateMessage(msgId, currentText, currentReasoning); }
                  );
                  if (currentText.trim().length > 0) {
                    contextRef.current.push(`${agent.name}: ${currentText}`);
                    finalizeMessage(msgId, currentText, currentReasoning);
                    success = true;
                  } else { throw new Error("Empty response"); }
                } catch (e) {
                  if (abortControllerRef.current?.signal.aborted) return; // Silent exit on abort
                  attempts++;
                  if (attempts < maxAttempts) { updateMessage(msgId, `(Retrying: attempt ${attempts}...)`, ""); await delay(1000 * attempts); }
                  else { updateMessage(msgId, `(Network error: ${e.message})`, ""); }
                }
              }
            }
            setIsProcessing(false);
          };

          const runConsensus = async () => {
            if (abortControllerRef.current?.signal.aborted) return;

            const msgId = addToTranscript('Moderator', 'moderator', '', 'bg-slate-800 text-white', '');
            const fullHistory = contextRef.current;
            let contextStr = "";
            if (fullHistory.length > 30) {
                const topicMsg = fullHistory[0];
                const recentMsgs = fullHistory.slice(-25);
                contextStr = [topicMsg, "...(earlier history omitted)...", ...recentMsgs].join("\n\n");
            } else { contextStr = fullHistory.join("\n\n"); }

            const prompt = `You are the moderator. Topic: "${topic}".\nTranscript: """${contextStr}"""\nSummarize the main disagreements and deepest insights, then issue a final resolution. Respond in English.`;
            let currentText = ""; let currentReasoning = "";
            try {
              await streamLLM([{ role: "user", content: prompt }], config.moderatorModel,
                (t) => { currentText += t; updateMessage(msgId, currentText, currentReasoning); },
                (r) => { currentReasoning += r; updateMessage(msgId, currentText, currentReasoning); }
              );
              contextRef.current.push(`Moderator: ${currentText}`);
              finalizeMessage(msgId, currentText, currentReasoning);
            } catch (e) {
                if (!abortControllerRef.current?.signal.aborted) {
                    updateMessage(msgId, `(Generation failed: ${e.message})`, currentReasoning);
                }
            }
          };

          const startNewSession = async () => {
            if (!topic.trim()) return;
            if (!config.apiKey) { setIsSettingsOpen(true); return; }

            // Create new controller
            abortControllerRef.current = new AbortController();

            const newId = generateId();
            const newSession = { id: newId, topic, date: new Date().toISOString(), agents: [], transcript: [] };
            setCurrentSessionId(newId);
            activeSessionIdRef.current = newId;
            setSessions(prev => [newSession, ...prev]);
            setAgents([]); setTranscript([]);
            contextRef.current = [`Current topic: ${topic}`];
            setIsProcessing(true); setStage('recruiting');

            try {
              addToTranscript('System', 'system', "Assembling the Council of Sages...");
              const targetCount = config.expandedCouncil ? 5 : 3;

              const selectedSkillAgents = [];
              if (config.specifyAgents) {
                customAgentSkills.slice(0, targetCount).forEach((skillId, idx) => {
                    if (!skillId) return;
                    const skill = skillMap.get(skillId);
                    if (!skill) return;
                    selectedSkillAgents.push({
                        name: customAgentNames[idx]?.trim() || skill.name,
                        description: skill.description,
                        source: 'skill',
                        skillProfile: skill.profile
                    });
                });
              }

              const specifiedAgents = config.specifyAgents
                ? customAgentNames.slice(0, targetCount).filter((n, idx) => n.trim() && !customAgentSkills[idx])
                : [];
              const specifiedNamesStr = specifiedAgents.length > 0 ? specifiedAgents.join(", ") : "None";
              const specifiedInstruction = specifiedAgents.length > 0
                ? `\nImportant: The user requires the following council members: [${specifiedNamesStr}]. Prioritize appropriate persona descriptions for these specified members.`
                : "";

              const remainingCount = Math.max(0, targetCount - selectedSkillAgents.length);
              const prompt = `Topic: "${topic}". Identify **${remainingCount}** expert personas. Return only a JSON array: [{ "name": "...", "description": "..." }]${specifiedInstruction}. Use English names and descriptions.`;
              let recruited = [];
              if (remainingCount > 0) try {
                // Pass null for signal since callLLM uses the same streamLLM logic which reads the ref
                const raw = await callLLM([{ role: "user", content: prompt }], config.moderatorModel);
                if (abortControllerRef.current?.signal.aborted) return;

                recruited = JSON.parse(raw.replace(/```json/g, '').replace(/```/g, '').trim());
                if (recruited.length < remainingCount) {
                    const needed = remainingCount - recruited.length;
                    recruited = [...recruited, ...FALLBACK_AGENTS_POOL.filter(f => !recruited.some(r => r.name === f.name)).slice(0, needed)];
                }
              } catch (e) { recruited = FALLBACK_AGENTS_POOL.slice(0, remainingCount); }

              if (abortControllerRef.current?.signal.aborted) return;

              const colors = ["bg-blue-50 border-blue-200 text-blue-900", "bg-emerald-50 border-emerald-200 text-emerald-900", "bg-purple-50 border-purple-200 text-purple-900", "bg-amber-50 border-amber-200 text-amber-900", "bg-rose-50 border-rose-200 text-rose-900"];
              const mergedAgents = [...selectedSkillAgents, ...recruited].slice(0, targetCount);
              const styledAgents = mergedAgents.map((a, i) => ({ ...a, style: colors[i % colors.length] }));

              setAgents(styledAgents);
              updateSessionInHistory(newId, { agents: styledAgents });
              addToTranscript('System', 'system', `Council assembled: ${styledAgents.map(a => a.name).join(', ')}`);

              setStage('debating');
              const rounds = Math.max(1, parseInt(config.debateRounds) || 1);
              for (let i = 1; i <= rounds; i++) {
                if (abortControllerRef.current?.signal.aborted) return;
                const title = i === 1 ? "Round 1: Opening Positions" : (config.deepDebate ? `Round ${i}: Deep Debate` : `Round ${i}: Cross-Examination`);
                addToTranscript('Moderator', 'moderator', title, "bg-slate-800 text-white");
                await runDebateRound(styledAgents, i === 1 ? 'initial' : 'rebuttal');
              }

              if (abortControllerRef.current?.signal.aborted) return;
              setStage('concluding');
              addToTranscript('System', 'system', "Drafting the final resolution...");
              await runConsensus();
              setStage('finished');
            } catch (error) {
              if (!abortControllerRef.current?.signal.aborted) {
                  addToTranscript('System', 'system', `❌ Error: ${error.message}`);
                  setStage('error');
              }
            } finally { setIsProcessing(false); }
          };

          const handleUserSubmit = async () => {
            if (!userInput.trim()) return;
            const text = userInput; setUserInput('');
            const msgId = addToTranscript('Me (User)', 'user', text, 'bg-gray-100 border-gray-300 text-gray-800');
            finalizeMessage(msgId, text, "");
            if (!isProcessing && agents.length > 0) {
                // Restart processing if user intervenes
                abortControllerRef.current = new AbortController();
                setIsProcessing(true);
                setStage('debating');
                addToTranscript('System', 'system', "New input received. Continuing the discussion...");
                await runDebateRound(agents, 'rebuttal');
                setStage('finished');
                setIsProcessing(false);
            }
          };

          const continueDebate = async () => {
            setStage('debating');
            addToTranscript('System', 'system', "New input received. Continuing the discussion...");
            await runDebateRound(agents, 'rebuttal');
            setStage('finished');
          };

          const deleteSession = (e, id) => {
            e.stopPropagation();
            setSessions(prev => prev.filter(s => s.id !== id));
            if (currentSessionId === id) {
                setTopic(''); setCurrentSessionId(null); setAgents([]); setTranscript([]); activeSessionIdRef.current = null; contextRef.current = []; setStage('idle');
            }
          };

          const loadSession = (session) => {
            if (isProcessing) return;
            setCurrentSessionId(session.id);
            activeSessionIdRef.current = session.id;
            setTopic(session.topic);
            setAgents(session.agents || []);
            setTranscript(session.transcript || []);
            const rebuilt = [`Current topic: ${session.topic}`];
            (session.transcript || []).forEach(t => {
               const prefix = t.role === 'user' ? `[User intervention]: ` : `${t.sender}: `;
               rebuilt.push(`${prefix}${t.text}`);
            });
            contextRef.current = rebuilt;
            setStage((session.transcript || []).length > 0 ? 'finished' : 'idle');
            setIsSettingsOpen(false);
          };

          const downloadSingleSession = (targetSession = null) => {
            let data = []; let title = "Untitled Topic";
            if (targetSession) { data = targetSession.transcript || []; title = targetSession.topic; }
            else if (activeSessionIdRef.current) {
                const s = sessions.find(x => x.id === activeSessionIdRef.current);
                if (s && s.transcript) { data = s.transcript; title = s.topic; }
                else { data = transcript; title = topic; }
            } else { data = transcript; title = topic; }

            if (!data || data.length === 0) { alert("Download failed: no valid transcript was found."); return; }
            let content = `# Topic: ${title}\n\nDate: ${new Date().toLocaleString()}\n\n---\n\n`;
            data.forEach(msg => {
                if(msg.role!=='system') {
                    content += `### ${msg.sender}\n`;
                    if (msg.reasoning) content += `> [Reasoning] ${msg.reasoning.replace(/\n/g,'\n> ')}\n\n`;
                    content += `${msg.text}\n\n`;
                }
            });
            const url = URL.createObjectURL(new Blob([content], { type: 'text/markdown' }));
            const a = document.createElement('a'); a.href = url; a.download = `council_of_sages_${title.slice(0,10).replace(/[\\/:*?"<>|]/g, '')}.md`; a.click();
          };

          const downloadAllSessions = () => {
            const url = URL.createObjectURL(new Blob([JSON.stringify(sessions)], { type: 'application/json' }));
            const a = document.createElement('a'); a.href = url; a.download = `backup_${Date.now()}.json`; a.click();
          };

          // --- VIEW HELPERS ---
          const structuredRounds = useMemo(() => {
            const rounds = [];
            let currentRound = { title: "Opening", msgs: [] };
            transcript.forEach(msg => {
                const isMod = msg.role === 'moderator';
                const isModContent = isMod && (msg.text.length > 50 || msg.text.includes('\n'));
                const isRoundMarker = isMod && !isModContent;

                if (isRoundMarker) {
                    if (currentRound.msgs.length > 0) rounds.push(currentRound);
                    let title = msg.text;
                    if (title.includes("Round 1")) title = "Round 1: Opening Positions";
                    else if (title.includes("Round 2")) title = "Round 2: Cross-Examination";
                    else if (title.includes("Resolution") || title.includes("Draft")) title = "Final Resolution (Drafting...)";
                    currentRound = { title: title, msgs: [] };
                } else if (isMod && isModContent) {
                    if (currentRound.title !== "Final Resolution") {
                         if (currentRound.msgs.length > 0) rounds.push(currentRound);
                         currentRound = { title: "Final Resolution", msgs: [] };
                    }
                    currentRound.msgs.push(msg);
                } else if (msg.role !== 'system') {
                    currentRound.msgs.push(msg);
                }
            });
            if (currentRound.msgs.length > 0) rounds.push(currentRound);
            return rounds;
          }, [transcript]);

          const switchLanguage = (language) => {
            localStorage.setItem('council_language', language);
            sessionStorage.setItem('council_active_session_id', activeSessionIdRef.current || '');
            sessionStorage.setItem('council_topic_draft', topic);
            sessionStorage.setItem('council_user_draft', userInput);
            const targetFile = language === 'zh' ? 'index-V9.1.html' : 'index-V9.1-en.html';
            window.location.href = new URL(targetFile, window.location.href).href;
          };

          return (
            <div className="flex h-screen bg-slate-50 font-sans overflow-hidden">
              {/* Sidebar */}
              <div className="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex">
                <div className="p-4 border-b border-gray-100"><h1 className="text-lg font-bold flex items-center gap-2 text-indigo-600"><Users className="w-6 h-6" /> Council of Sages</h1></div>
                <div className="p-2"><button onClick={() => {setTopic(''); setCurrentSessionId(null); setAgents([]); setTranscript([]); setStage('idle'); setIsSettingsOpen(false);}} className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg text-sm font-medium transition-colors"><Plus className="w-4 h-4" /> New Topic</button></div>
                <div className="flex-1 overflow-y-auto p-2 space-y-2">
                  {sessions.map(s => (
                    <div key={s.id} onClick={() => loadSession(s)} className={`group p-3 rounded-lg cursor-pointer text-sm border transition-all ${currentSessionId === s.id ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-transparent hover:bg-gray-50'}`}>
                      <div className="font-medium truncate mb-1">{s.topic || "Untitled"}</div>
                      <div className="flex justify-between text-xs opacity-70"><span>{new Date(s.date).toLocaleDateString()}</span><div className="flex gap-1"><button onClick={(e) => { e.stopPropagation(); downloadSingleSession(s); }} className="p-1 hover:bg-indigo-200 rounded"><Download className="w-3 h-3" /></button><button onClick={(e) => deleteSession(e, s.id)} className="p-1 hover:bg-red-100 hover:text-red-600 rounded"><Trash2 className="w-3 h-3" /></button></div></div>
                    </div>
                  ))}
                </div>
                <div className="p-3 border-t border-gray-200 bg-gray-50">
                    <button onClick={downloadAllSessions} disabled={!sessions.length} className="w-full flex items-center justify-center gap-2 text-slate-600 text-xs font-medium mb-3"><Download className="w-3 h-3" /> Local Backup (JSON)</button>
                    <div className="pt-2 border-t border-gray-200">
                        {isGoogleSignedIn ? (
                            <div className="space-y-2">
                                <div className="flex items-center justify-between text-xs text-green-700 font-medium px-1"><span>Google Drive Connected</span><button onClick={handleGoogleLogout} title="Sign out"><LogOut className="w-3 h-3" /></button></div>
                                <button onClick={uploadToDrive} disabled={driveStatus==='uploading'} className="w-full flex items-center justify-center gap-2 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-xs font-medium py-1.5 rounded transition-colors">{driveStatus==='uploading'?<RotateCcw className="w-3 h-3 animate-spin"/>:<Cloud className="w-3 h-3"/>} Back Up to Cloud</button>
                                {driveStatus==='success' && <div className="text-[10px] text-center text-green-600">Backup complete!</div>}
                            </div>
                        ) : (
                            <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-2 text-slate-500 hover:text-indigo-600 text-xs font-medium transition-colors"><UploadCloud className="w-3 h-3" /> Connect Google Drive</button>
                        )}
                    </div>
                </div>
              </div>

              {/* Main */}
              <div className="flex-1 flex flex-col min-w-0 bg-white">
                <header className="h-14 border-b border-gray-200 flex justify-between items-center px-6 shrink-0 z-10 bg-white/80 backdrop-blur-sm sticky top-0">
                  <div className="md:hidden font-bold text-indigo-600">Council of Sages</div>
                  <div className="flex items-center gap-2 bg-gray-100 rounded-lg p-1">
                      <button onClick={() => setViewMode('list')} className={`p-1.5 rounded-md transition-all ${viewMode === 'list' ? 'bg-white shadow text-indigo-600' : 'text-gray-500 hover:text-gray-700'}`} title="List view"><List className="w-4 h-4" /></button>
                      <button onClick={() => setViewMode('board')} className={`p-1.5 rounded-md transition-all ${viewMode === 'board' ? 'bg-white shadow text-indigo-600' : 'text-gray-500 hover:text-gray-700'}`} title="Board view"><LayoutGrid className="w-4 h-4" /></button>
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="flex items-center rounded-lg border border-gray-200 bg-gray-50 p-0.5 text-[11px] font-semibold" role="group" aria-label="Language switcher">
                      <button type="button" onClick={() => switchLanguage('zh')} className={`rounded-md px-2 py-1 transition-colors text-slate-500 hover:text-slate-700`} aria-pressed={false}>中文</button>
                      <button type="button" onClick={() => switchLanguage('en')} className={`rounded-md px-2 py-1 transition-colors bg-indigo-600 text-white shadow-sm`} aria-pressed={true}>EN</button>
                    </div>
                    {transcript.length > 0 && <button onClick={() => downloadSingleSession()} className="p-2 rounded-full text-gray-500 hover:bg-indigo-50"><FileText className="w-5 h-5" /></button>}
                    {isProcessing && <button onClick={handleStop} className="flex items-center gap-1 bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded-full text-sm font-medium transition-colors border border-red-200"><Square className="w-3 h-3 fill-current" /> Stop Debate</button>}
                    <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className="p-2 rounded-full hover:bg-gray-100 text-gray-500" title="Global Settings (Cloud Backup)"><Settings className="w-5 h-5" /></button>
                  </div>
                </header>

                <main className="flex-1 overflow-y-auto bg-slate-50/50" ref={scrollRef}>
                  <div className="max-w-6xl mx-auto p-4 md:p-8 pb-24 min-h-full">
                    {/* Main Settings (Now just for Cloud Backup) */}
                    {isSettingsOpen && (
                      <div className="bg-white p-6 rounded-xl border border-gray-200 mb-8 shadow-sm animate-in slide-in-from-top-2">
                         <div className="flex justify-between items-center mb-6 border-b pb-2"><h2 className="text-xl font-bold flex items-center gap-2 text-slate-800"><Settings className="w-5 h-5" /> Global Settings</h2><button onClick={() => setIsSettingsOpen(false)} className="text-gray-400 hover:text-gray-600">Collapse</button></div>

                    {transcript.length === 0 && !isProcessing && (

                        <div className="w-full max-w-2xl relative group">

                                </div>
                             </div>
                          </div>
                        </div>
                      </div>

                    {transcript.length > 0 && viewMode === 'board' && (
                        <div className="space-y-8 animate-in fade-in duration-300">
                            <div className="text-center mb-4"><h2 className="text-2xl font-bold text-slate-800">{topic}</h2>{isProcessing && <div className="flex items-center justify-center gap-2 text-indigo-600 text-sm mt-2 animate-pulse"><Cpu className="w-4 h-4" /> The council is deliberating...</div>}</div>
                            <div className="flex gap-6 overflow-x-auto pb-4 snap-x">{structuredRounds.map((round, idx) => (<div key={idx} className="flex-none w-80 md:w-96 flex flex-col gap-4 snap-start"><div className="font-bold text-slate-600 border-b-2 border-indigo-100 pb-2 mb-2 sticky top-0 bg-slate-50/95 backdrop-blur z-10 flex items-center gap-2"><span className="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded-full">Phase {idx+1}</span>{round.title.replace(/[:：].*$/, '')}</div><div className="flex flex-col gap-3">{round.msgs.map(msg => (<MessageCard key={msg.id} msg={msg} onSelect={setSelectedMsg} />))}</div></div>))}</div>
                        </div>
                    )}

                    {transcript.length > 0 && viewMode === 'list' && (
                        <div className="space-y-6 animate-in fade-in duration-300 max-w-3xl mx-auto"><div className="text-center mb-8 border-b border-gray-200 pb-6"><h2 className="text-2xl font-bold text-slate-800">{topic}</h2></div>{transcript.map(msg => <MessageBubble key={msg.id} msg={msg} />)}{isProcessing && stage === 'recruiting' && <div className="text-center text-gray-400 animate-pulse">Assembling the council...</div>}</div>
                    )}
                  </div>
                </main>

                {(transcript.length > 0 || isProcessing) && (
                  <div className="border-t border-gray-200 bg-white p-4 sticky bottom-0 z-20 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
                    <div className="max-w-4xl mx-auto flex gap-2 items-end">
                      <AutoResizeTextarea value={userInput} onChange={(e) => setUserInput(e.target.value)} onEnter={handleUserSubmit} placeholder="Add a point or ask a follow-up question..." className="flex-1 p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition bg-white" />
                      <button onClick={handleUserSubmit} disabled={!userInput.trim()} className="p-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 disabled:bg-gray-300 transition-colors h-[46px] w-[46px] flex items-center justify-center shrink-0"><Send className="w-5 h-5" /></button>
                    </div>
                  </div>
                )}

                {/* --- SEMINAR SETTINGS MODAL --- */}
                <Modal isOpen={config.isSeminarConfigOpen} onClose={() => setConfig({...config, isSeminarConfigOpen: false})} maxWidth="max-w-3xl">
                    <div className="space-y-8">
                        <div className="flex items-center gap-2 mb-4 border-b border-gray-100 pb-4">
                            <Wrench className="w-6 h-6 text-indigo-600" />
                            <h2 className="text-2xl font-bold text-slate-800">Debate Settings (Seminar Config)</h2>
                        </div>

                        {/* 1. Core Model Config */}
                        <div>
                            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2"><Cpu className="w-4 h-4"/> Core Model Configuration</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-5 rounded-xl border border-gray-100">
                                <div className="space-y-4">
                                    <div><label className="text-sm font-medium text-gray-700">Base URL</label><input type="text" placeholder="https://api.aihubmix.com/v1" className="w-full p-2 border rounded mt-1 text-sm font-mono" value={config.baseUrl} onChange={e => setConfig({...config, baseUrl: e.target.value})} /></div>
                                    <div><label className="text-sm font-medium text-gray-700">API Key</label><input type="password" placeholder="sk-..." className="w-full p-2 border rounded mt-1 text-sm font-mono" value={config.apiKey} onChange={e => setConfig({...config, apiKey: e.target.value})} /></div>
                                    <div className="flex items-center gap-4 text-sm">
                                        <button onClick={testConnection} className={`flex items-center gap-2 px-3 py-1.5 rounded-md border text-xs transition-colors ${manualModelInput ? 'bg-white border-indigo-200 text-indigo-600 hover:bg-indigo-50' : 'bg-slate-200 text-slate-700 border-transparent'}`}>{connectionStatus === 'testing' ? <RotateCcw className="w-3 h-3 animate-spin" /> : <RefreshCw className="w-3 h-3" />} {manualModelInput ? 'Testing connection...' : 'Test Connection & Load Models'}</button>
                                        {connectionStatus === 'success' && <span className="text-green-600 flex items-center gap-1 text-xs"><CheckCircle2 className="w-3 h-3"/> Connected</span>}
                                    </div>
                                    {errorMessage && <div className="text-xs text-red-600 bg-red-50 p-2 rounded">{errorMessage}</div>}
                                </div>
                                <div className="space-y-4">
                                    <div onClick={() => setConfig(prev => ({...prev, expandedCouncil: !prev.expandedCouncil}))} className={`p-3 border rounded cursor-pointer flex justify-between items-center ${config.expandedCouncil ? 'bg-indigo-50 border-indigo-300' : 'bg-white'}`}><span><Users className="w-4 h-4 inline mr-2 text-indigo-600"/> Expanded Council (5 members)</span><div className={`w-8 h-4 rounded-full relative transition-colors ${config.expandedCouncil ? 'bg-indigo-600' : 'bg-gray-300'}`}><div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${config.expandedCouncil ? 'left-4.5' : 'left-0.5'}`} style={{left: config.expandedCouncil ? '18px' : '2px'}}/></div></div>
                                    <div onClick={() => setConfig(prev => ({...prev, deepDebate: !prev.deepDebate}))} className={`p-3 border rounded cursor-pointer flex justify-between items-center ${config.deepDebate ? 'bg-indigo-50 border-indigo-300' : 'bg-white'}`}><span><Zap className="w-4 h-4 inline mr-2 text-amber-500"/> Deep Debate</span><div className={`w-8 h-4 rounded-full relative transition-colors ${config.deepDebate ? 'bg-indigo-600' : 'bg-gray-300'}`}><div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all`} style={{left: config.deepDebate ? '18px' : '2px'}}/></div></div>
                                    {config.deepDebate && <div className="flex items-center justify-between text-sm pl-2"><label>Rounds:</label><input type="number" min="1" max="5" value={config.debateRounds} onChange={e => setConfig({...config, debateRounds: parseInt(e.target.value)})} className="w-16 p-1 border rounded text-center" /></div>}

                                    <div className="pt-2 border-t border-gray-200 grid grid-cols-2 gap-2">
                                        <div><div className="flex justify-between items-center mb-1"><label className="text-xs font-medium text-gray-500">Council Model</label></div>{manualModelInput || availableModels.length === 0 ? (<input type="text" className="w-full p-2 border border-gray-300 rounded text-xs" placeholder="e.g. deepseek-reasoner" value={config.model} onChange={(e) => setConfig({...config, model: e.target.value})} />) : (<div className="relative"><input type="text" placeholder="Filter..." className="w-full p-1 mb-1 border border-gray-200 rounded text-[10px] bg-gray-50" value={modelFilter} onChange={(e) => setModelFilter(e.target.value)} /><select className="w-full p-2 border border-gray-300 rounded text-xs bg-white" value={config.model} onChange={(e) => setConfig({...config, model: e.target.value})}>{filteredModels.map(m => <option key={m} value={m}>{m}</option>)}</select></div>)}</div>
                                        <div><div className="flex justify-between items-center mb-1"><label className="text-xs font-medium text-gray-500">Moderator Model</label></div>{manualModelInput || availableModels.length === 0 ? (<input type="text" className="w-full p-2 border border-gray-300 rounded text-xs" placeholder="e.g. gpt-4" value={config.moderatorModel} onChange={(e) => setConfig({...config, moderatorModel: e.target.value})} />) : (<div className="relative"><input type="text" placeholder="Filter..." className="w-full p-1 mb-1 border border-gray-200 rounded text-[10px] bg-gray-50" value={modFilter} onChange={(e) => setModFilter(e.target.value)} /><select className="w-full p-2 border border-gray-300 rounded text-xs bg-white" value={config.moderatorModel} onChange={(e) => setConfig({...config, moderatorModel: e.target.value})}>{filteredModModels.map(m => <option key={m} value={m}>{m}</option>)}</select></div>)}</div>
                                    </div>
                                    <div className="flex justify-end"><button onClick={() => setManualModelInput(!manualModelInput)} className="flex items-center gap-1 text-[10px] text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-2 py-1 rounded-md transition-colors">{manualModelInput ? <ToggleLeft className="w-3 h-3" /> : <ToggleRight className="w-3 h-3" />} {manualModelInput ? "Use model list" : "Enter manually"}</button></div>
                                </div>
                            </div>
                        </div>

                        {/* 2. Advanced Thinking Config */}
                        <div>
                             <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2"><BrainCircuit className="w-4 h-4"/> Advanced Reasoning Settings</h3>
                             <div className="bg-slate-50 p-5 rounded-xl border border-gray-100 space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-2"><Feather className="w-4 h-4 text-indigo-500"/> Council Reasoning & Language Style</label>
                                    <textarea className="w-full p-3 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition h-20 resize-y" placeholder="For example: Use clear, accessible, and logically rigorous professional English." value={config.agentStylePrompt} onChange={(e) => setConfig({...config, agentStylePrompt: e.target.value})} />
                                </div>
                                <div className="pt-4 border-t border-gray-200">
                                    <div className="mb-4 bg-white border rounded-lg p-3">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-2 text-sm font-medium text-slate-700"><Database className="w-4 h-4 text-indigo-500" /> Skill Manager</div>
                                            <button onClick={refreshRemoteSkills} disabled={isRefreshingSkills} className="text-xs px-2 py-1 rounded border border-indigo-200 text-indigo-600 hover:bg-indigo-50 disabled:opacity-50">{isRefreshingSkills ? 'Checking...' : 'Refresh Available Skills'}</button>
                                        </div>
                                        <div className="text-xs text-slate-500 mt-2">{BUILTIN_SKILLS.length} built-in skills and {importedSkills.length} imported skills. Names are displayed consistently in English.</div>
